<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生活好時光：腦力挑戰 (Firebase 數據版)</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #FDFBF7;
            --text-color: #333333;
            --primary-btn: #2A9D8F;
            --secondary-btn: #E9C46A;
            --accent-color: #E76F51;
            --card-bg: #FFFFFF;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --highlight-red: #D32F2F;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; transition: background-color 0.8s; box-sizing: border-box;
        }

        .status-bar {
            position: fixed; top: 20px; left: 20px;
            display: flex; gap: 10px; z-index: 10;
        }

        .tag {
            padding: 8px 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold;
            background: white; box-shadow: var(--shadow); border: 2px solid #EEE;
        }

        .stage { width: 100%; max-width: 800px; text-align: center; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 2.2rem; margin-bottom: 25px; line-height: 1.4; color: var(--text-color); }
        .highlight { color: var(--highlight-red); font-weight: bold; }

        .items-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }

        .item-card {
            background: var(--card-bg); border: 4px solid #eee; border-radius: 25px;
            padding: 30px; box-shadow: var(--shadow); font-size: 5rem;
            transition: all 0.3s; cursor: pointer; user-select: none;
        }

        .item-card.selected { border-color: var(--primary-btn); background-color: #E0F2F1; transform: scale(1.05); }

        .arrow { font-size: 2.5rem; color: #BBB; align-self: center; }

        .btn-large {
            background-color: var(--primary-btn); color: white; border: none;
            padding: 22px 60px; font-size: 1.8rem; border-radius: 60px;
            cursor: pointer; box-shadow: 0 6px 20px rgba(42, 157, 143, 0.3);
            margin-top: 30px; transition: transform 0.2s;
        }
        
        .btn-large:disabled {
            background-color: #ccc; cursor: not-allowed; box-shadow: none;
        }

        .btn-large:active:not(:disabled) { transform: scale(0.95); }

        .sound-toggle {
            position: fixed; top: 20px; right: 20px; font-size: 2rem;
            background: white; border-radius: 50%; width: 65px; height: 65px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); cursor: pointer; border: 2px solid #eee; z-index: 100;
        }

        .metrics-log {
            background: #f0f0f0; padding: 15px; border-radius: 10px;
            font-family: monospace; font-size: 0.9rem; text-align: left;
            margin-top: 20px; overflow-x: auto; max-width: 100%;
        }

        /* 新增：輸入框樣式 */
        .input-group {
            margin: 15px 0;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .input-field {
            padding: 15px 20px; font-size: 1.2rem; border-radius: 15px;
            border: 2px solid #ddd; width: 80%; max-width: 300px;
            text-align: center; outline: none; transition: border-color 0.3s;
        }
        .input-field:focus { border-color: var(--primary-btn); }
    </style>
</head>
<body>

    <div class="sound-toggle" onclick="toggleSound()">🔊</div>

    <div class="status-bar">
        <div id="round-tag" class="tag" style="background: var(--secondary-btn); color: #333;">準備中</div>
        <div id="mode-tag" class="tag" style="color: var(--primary-btn);">模式載入中</div>
        <div id="lv-tag" class="tag" style="color: #673AB7;">Level 1</div>
    </div>

    <div class="stage" id="game-stage">
        <h1>🌞 生活好時光</h1>
        <h2>歡迎！<br>請先輸入基本資料，再開始本次練習。</h2>
        
        <div class="input-group">
            <input type="text" id="playerName" class="input-field" placeholder="請輸入您的姓名">
            <input type="number" id="playerAge" class="input-field" placeholder="請輸入您的年齡 (歲)">
        </div>

        <button class="btn-large" onclick="initGameSession()">開始挑戰</button>
    </div>

    <script>
        // --- 2. Firebase 初始設定 (請替換為你自己的 Firebase 專案金鑰) ---
        const firebaseConfig = {
            apiKey: "AIzaSyB6wcFs5gSiNDCSweKcEzgRpbIAAb5I3Vo",
            authDomain: "smart-squat-health.firebaseapp.com",
            projectId: "smart-squat-health",
            storageBucket: "smart-squat-health.firebasestorage.app",
            messagingSenderId: "475970550783",
            appId: "1:475970550783:web:2d7dcacb2e55b562eb05ca",
        };

        // 初始化 Firebase 與 Firestore
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 遊戲全域變數 ---
        let userInfo = { name: "", age: 0 };
        const GAME_INPUT = { "session_id": "GAME_SESSION_" + Date.now() }; // 改用時間戳記讓 session_id 唯一

        const ASSETS = {
            "HOME": { label: "🏠 居家", color: "#FFF8E1", items: ["🔑", "📱", "🌂", "👓", "☕", "🧢", "📺", "🧦", "📚", "💊"] },
            "MARKET": { label: "🛒 超市", color: "#E8F5E9", items: ["🍎", "🥦", "🍞", "🥩", "🐟", "🥕", "🍇", "🥚", "🥛", "🍪"] },
            "NATURE": { label: "🌳 公園", color: "#E1F5FE", items: ["🐶", "🐱", "🐦", "🌷", "🌲", "🦋", "🌞", "🚲", "🎈", "🐝"] },
            "HOSPITAL": { label: "🏥 醫院", color: "#FCE4EC", items: ["🩺", "🚑", "🧪", "🌡️", "💉", "🩹", "🏥", "🧑‍⚕️", "🦷", "♿"] },
            "OFFICE": { label: "💻 辦公室", color: "#ECEFF1", items: ["💻", "🖨️", "🖱️", "📁", "📎", "✂️", "📅", "🖊️", "⌨️", "🎧"] },
            "KITCHEN": { label: "🍳 廚房", color: "#FFF3E0", items: ["🍳", "🔪", "🥘", "🧂", "🥢", "🥣", "🍴", "🍶", "🧼", "🍞"] }
        };

        const SEQUENCE_ASSETS = [
            { items: ["🛌 起床", "🍳 早餐", "🚶 出門", "🏠 回家"], label: "日常生活" },
            { items: ["🍎 洗蘋果", "🔪 切蘋果", "🍽️ 擺盤", "😋 吃掉"], label: "吃水果" },
            { items: ["💻 開機", "📧 收信", "⌨️ 寫報告", "🖨️ 列印"], label: "辦公流程" },
            { items: ["🌡️ 量體溫", "🧑‍⚕️ 看醫生", "💊 領藥", "💧 喝水"], label: "看病流程" },
            { items: ["🧺 洗衣服", "☀️ 曬衣服", "🧺 收衣服", "👗 摺衣服"], label: "洗衣服" },
            { items: ["🥘 煮飯", "🍽️ 擺碗筷", "😋 吃飯", "🧼 洗碗"], label: "用餐時間" },
            { items: ["👟 穿鞋子", "🌳 到公園", "🏃 跑步", "🥤 喝水"], label: "外出運動" },
            { items: ["🌱 挖土", "🌻 種種子", "🚿 澆水", "🌸 開花"], label: "園藝生活" }
        ];

        const TOTAL_ROUNDS = 10;
        let currentRound = 0;
        let correctCount = 0;
        let currentDifficulty = 1;
        let currentLevelData = null;
        let selected = [];
        let soundOn = true;
        let difficultyChanged = 0;

        let startTime = 0;
        let reactionTimes = []; 

        const stage = document.getElementById('game-stage');

        // --- 3. 處理使用者輸入並開始遊戲 ---
        function initGameSession() {
            const nameInput = document.getElementById('playerName').value.trim();
            const ageInput = document.getElementById('playerAge').value.trim();

            if (!nameInput || !ageInput) {
                alert("請完整輸入姓名與年齡，才能開始挑戰喔！");
                return;
            }

            userInfo.name = nameInput;
            userInfo.age = parseInt(ageInput);
            
            resetGame();
        }

        function resetGame() {
            currentRound = 0;
            correctCount = 0;
            currentDifficulty = 1;
            reactionTimes = [];
            nextRound();
        }

        function nextRound() {
            currentRound++;
            if (currentRound > TOTAL_ROUNDS) {
                showFinalSummary();
                return;
            }
            startGame();
        }

        function startGame() {
            const isSeq = Math.random() < 0.4;
            currentLevelData = isSeq ? Generator.createSequenceLevel() : Generator.createItemLevel(currentDifficulty);
            selected = [];
            difficultyChanged = 0;
            
            document.body.style.backgroundColor = currentLevelData.color;
            document.getElementById('round-tag').innerText = `第 ${currentRound}/${TOTAL_ROUNDS} 關`;
            document.getElementById('mode-tag').innerText = currentLevelData.type === "ITEM" ? "🧠 物品記憶" : "🕒 順序推理";
            document.getElementById('lv-tag').innerText = currentLevelData.type === "ITEM" ? `Level ${currentDifficulty}` : "邏輯訓練";

            showStimulus();
        }

        const Generator = {
            pickRandom: (arr, n) => [...arr].sort(() => Math.random() - 0.5).slice(0, n),
            createItemLevel: (difficulty) => {
                const keys = Object.keys(ASSETS);
                const ctx = ASSETS[keys[Math.floor(Math.random() * keys.length)]];
                const targetCount = difficulty + 1;
                const targets = Generator.pickRandom(ctx.items, targetCount);
                const distractors = Generator.pickRandom(ctx.items.filter(i => !targets.includes(i)), difficulty === 3 ? 5 : targetCount);
                return {
                    type: "ITEM", label: ctx.label, color: ctx.color, targets: targets,
                    options: [...targets, ...distractors].sort(() => Math.random() - 0.5),
                    intro: `請找出剛剛出現的<br>那 ${targetCount} 個東西`
                };
            },
            createSequenceLevel: () => {
                const seq = SEQUENCE_ASSETS[Math.floor(Math.random() * SEQUENCE_ASSETS.length)];
                const i = Generator.pickRandom([0,1,2,3], 2).sort();
                const itemA = seq.items[i[0]], itemB = seq.items[i[1]];
                const askBefore = Math.random() > 0.5;
                return {
                    type: "SEQ", label: seq.label, color: "#E8EAF6", items: seq.items,
                    question: askBefore ? `請問「${itemA}」是在「${itemB}」<span class="highlight">之前</span>還是<span class="highlight">之後</span>?` : `請問「${itemB}」是在「${itemA}」<span class="highlight">之前</span>還是<span class="highlight">之後</span>?`,
                    answer: askBefore ? "之前" : "之後"
                };
            }
        };

        function showStimulus() {
            let html = `<h2>${currentLevelData.type === "ITEM" ? "請記住這些物品" : "請記住事情的先後順序"}</h2>`;
            html += `<div class="items-container">`;
            if(currentLevelData.type === "ITEM") {
                html += currentLevelData.targets.map(t => `<div class="item-card">${t}</div>`).join('');
            } else {
                html += currentLevelData.items.map(t => `<div class="item-card" style="font-size:2.5rem">${t}</div>`).join('<div class="arrow">➡</div>');
            }
            html += `</div><button class="btn-large" onclick="showTask()">看好了</button>`;
            stage.innerHTML = html;
        }

        function showTask() {
            startTime = Date.now();
            let html = `<h2>${currentLevelData.type === "ITEM" ? currentLevelData.intro : currentLevelData.question}</h2>`;
            html += `<div class="items-container">`;
            if(currentLevelData.type === "ITEM") {
                html += currentLevelData.options.map(o => `<div class="item-card" onclick="toggleSelect(this, '${o}')">${o}</div>`).join('');
                html += `</div><button class="btn-large" onclick="checkItemAnswer()">選好了</button>`;
            } else {
                html += `</div><div style="display:flex; gap:20px; justify-content:center;">
                            <button class="btn-large" style="background:var(--secondary-btn); color:#333" onclick="checkSeqAnswer('之前')">之前</button>
                            <button class="btn-large" style="background:var(--secondary-btn); color:#333" onclick="checkSeqAnswer('之後')">之後</button>
                         </div>`;
            }
            stage.innerHTML = html;
        }

        window.toggleSelect = (el, val) => {
            el.classList.toggle('selected');
            selected.includes(val) ? selected = selected.filter(v => v !== val) : selected.push(val);
            playEffect('click');
        };

        window.checkItemAnswer = () => {
            const rt = Date.now() - startTime;
            const isCorrect = selected.length === currentLevelData.targets.length && selected.every(v => currentLevelData.targets.includes(v));
            if (isCorrect) { 
                correctCount++; 
                reactionTimes.push(rt); 
                if (currentDifficulty < 3) { currentDifficulty++; difficultyChanged = 1; } 
            } else { 
                if (currentDifficulty > 1) { currentDifficulty--; difficultyChanged = -1; } 
            }
            showFeedback(isCorrect);
        };

        window.checkSeqAnswer = (ans) => {
            const rt = Date.now() - startTime;
            const isCorrect = (ans === currentLevelData.answer);
            if (isCorrect) {
                correctCount++;
                reactionTimes.push(rt);
            }
            showFeedback(isCorrect);
        };

        function showFeedback(correct) {
            let diffHint = "";
            if (currentLevelData.type === "ITEM") {
                if (difficultyChanged === 1) diffHint = "表現太棒了，難度提升囉！";
                else if (difficultyChanged === -1) diffHint = "沒關係，我們把難度降低一點。";
            }
            stage.innerHTML = `
                <div style="font-size: 6rem;">${correct ? "✨" : "☕"}</div>
                <h2>${correct ? "答對了！" : "再接再厲！"}</h2>
                <p style="font-size:1.5rem">正確答案是：<span class="highlight">${currentLevelData.type === "ITEM" ? currentLevelData.targets.join(' ') : currentLevelData.answer}</span></p>
                <div style="font-size:1.2rem; color:#666; min-height:1.5rem;">${diffHint}</div>
                <button class="btn-large" onclick="nextRound()">${currentRound === TOTAL_ROUNDS ? "查看結算與上傳數據" : "下一關"}</button>
            `;
            playEffect(correct ? 'success' : 'page');
        }

        // --- 4. 結算並上傳資料至 Firebase ---
        async function showFinalSummary() {
            const avgRT = reactionTimes.length > 0 
                ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length) 
                : 0;

            const GAME_OUTPUT = {
                session_id: GAME_INPUT.session_id,
                user_name: userInfo.name,
                user_age: userInfo.age,
                client_timestamp: Date.now(),
                metrics: {
                    levels_completed: correctCount,
                    avg_rt_ms: avgRT
                }
            };

            // 先顯示結算畫面 (按鈕呈現上傳中狀態)
            document.body.style.backgroundColor = "#FDFBF7";
            document.getElementById('round-tag').innerText = `測試完成`;
            
            stage.innerHTML = `
                <div style="font-size: 6rem;">🏆</div>
                <h1>挑戰完成！</h1>
                <h2>答對題數：<span class="highlight">${correctCount}</span> / 10</h2>
                <h2>平均反應時間：<span class="highlight">${avgRT}</span> 毫秒</h2>
                <div class="metrics-log" id="upload-status">
                    ⏳ 正在將 ${userInfo.name} 的數據同步至資料庫...
                </div>
                <button id="retry-btn" class="btn-large" onclick="resetGame()" disabled>再挑戰一次</button>
            `;

            // 執行上傳動作
            try {
                // 將資料寫入名為 "memory_game_results" 的集合 (Collection) 中
                await db.collection("memory_game_results").add(GAME_OUTPUT);
                
                document.getElementById('upload-status').innerHTML = `
                    <strong style="color: green;">✅ 數據已成功上傳至 Firebase！</strong><br><br>
                    <strong>上傳內容：</strong><br>
                    <pre>${JSON.stringify(GAME_OUTPUT, null, 2)}</pre>
                `;
            } catch (error) {
                console.error("Error adding document: ", error);
                document.getElementById('upload-status').innerHTML = `
                    <strong style="color: red;">❌ 上傳失敗，請檢查網路連線或金鑰設定。</strong><br>
                    錯誤訊息：${error.message}
                `;
            } finally {
                // 恢復按鈕狀態
                document.getElementById('retry-btn').disabled = false;
            }
        }

        function toggleSound() { soundOn = !soundOn; document.querySelector('.sound-toggle').innerText = soundOn ? '🔊' : '🔇'; }
        function playEffect(type) {
            if(!soundOn) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            if (type === 'click') { osc.frequency.setValueAtTime(400, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1); osc.start(); osc.stop(ctx.currentTime + 0.1); }
            else if (type === 'success') { osc.frequency.setValueAtTime(300, ctx.currentTime); osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.2); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5); osc.start(); osc.stop(ctx.currentTime + 0.5); }
        }
    </script>
</body>
</html>
