<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生活好時光 (記憶力) PoC版</title>
    <style>
        :root {
            --bg-color: #FDFBF7;
            --text-color: #333333;
            --primary-btn: #2A9D8F;
            --secondary-btn: #E9C46A;
            --card-bg: #FFFFFF;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --highlight-red: #D32F2F;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; box-sizing: border-box;
        }

        .status-bar {
            position: fixed; top: 20px; width: 90%; max-width: 800px;
            display: flex; justify-content: space-between; z-index: 10;
        }

        .tag {
            padding: 8px 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold;
            background: white; box-shadow: var(--shadow); border: 2px solid #EEE;
        }

        .stage { width: 100%; max-width: 800px; text-align: center; margin-top: 60px; }

        h2 { font-size: 1.8rem; margin-bottom: 20px; color: var(--text-color); }

        .items-container { 
            display: flex; gap: 15px; justify-content: center; 
            flex-wrap: wrap; margin: 20px 0; min-height: 250px;
        }

        .item-card {
            background: var(--card-bg); border: 4px solid #eee; border-radius: 20px;
            padding: 20px; box-shadow: var(--shadow); font-size: 4rem;
            transition: transform 0.1s, border-color 0.2s; cursor: pointer; user-select: none;
            width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
        }

        .item-card.selected { border-color: var(--primary-btn); background-color: #E0F2F1; transform: scale(1.05); }
        .item-card.error { border-color: var(--highlight-red); background-color: #FFEBEE; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-large {
            background-color: var(--primary-btn); color: white; border: none;
            padding: 18px 50px; font-size: 1.5rem; border-radius: 50px;
            cursor: pointer; box-shadow: 0 6px 20px rgba(42, 157, 143, 0.3); margin-top: 20px;
        }

        .btn-large:active { transform: scale(0.95); }

        .metrics-log {
            background: #fff; padding: 25px; border-radius: 15px;
            font-size: 1.1rem; text-align: left; margin-top: 20px; 
            box-shadow: var(--shadow); border: 1px solid #eee; line-height: 1.6;
        }

        .metrics-log strong { color: #111; font-size: 1.2rem; }
        .metrics-log span.desc { display: block; font-size: 0.95rem; color: #666; margin-bottom: 15px; margin-top: 5px; }

        #timer-bar-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 8px; background: #eee;
        }
        #timer-bar { height: 100%; background: var(--highlight-red); width: 100%; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="timer-bar-container"><div id="timer-bar"></div></div>

    <div class="status-bar">
        <div id="level-tag" class="tag" style="color: var(--primary-btn);">難度: 1</div>
        <div id="time-tag" class="tag" style="color: var(--highlight-red);">60s</div>
    </div>

    <div class="stage" id="game-stage">
        <h1>🌞 腦力極限挑戰</h1>
        <h2>準備好挑戰你的記憶天花板了嗎？</h2>
        <button class="btn-large" onclick="startGame()">開始 60 秒挑戰</button>
    </div>

    <script>
        const ASSETS = ["🍎", "🥦", "🍞", "🥩", "🐟", "🥕", "🍇", "🥚", "🥛", "🍪", "🔑", "📱", "🌂", "👓", "☕", "🧢", "📺", "🧦", "📚", "💊", "🐶", "🐱", "🐦", "🌷", "🌲", "🦋", "🌞", "🚲", "🎈", "🐝"];
        
        // 臨床特徵數據容器
        let metrics = {
            rtArray: [],           // 儲存每次點擊正確目標的反應時間
            maxCapacity: 0,        // 最大記憶容量 (最高答對的目標數量)
            commissionErrors: 0    // 假性記憶 (點擊錯誤干擾項的次數)
        };

        let currentLevel = 1;      // 動態難度級別
        let currentTargets = [];   // 當前關卡的正確目標
        let selectedItems = [];    // 使用者已點擊的項目
        
        let globalTimer = null;
        let startTime = 0;
        let optionsRenderTime = 0; // 選項出現的時間點
        let isRetrieving = false;  // 狀態鎖：是否處於可點擊選項的狀態

        function startGame() {
            // 重置所有數據與狀態
            metrics = { rtArray: [], maxCapacity: 0, commissionErrors: 0 };
            currentLevel = 1;
            startTime = performance.now();
            
            startGlobalTimer();
            playRound();
        }

        function startGlobalTimer() {
            const timeTag = document.getElementById('time-tag');
            const timerBar = document.getElementById('timer-bar');
            
            globalTimer = setInterval(() => {
                const elapsed = performance.now() - startTime;
                const remaining = 60000 - elapsed;
                
                if (remaining <= 0) {
                    clearInterval(globalTimer);
                    endGame();
                } else {
                    timeTag.innerText = Math.ceil(remaining / 1000) + 's';
                    timerBar.style.width = (remaining / 60000 * 100) + '%';
                }
            }, 100);
        }

        function playRound() {
            isRetrieving = false;
            selectedItems = [];
            document.getElementById('level-tag').innerText = `難度: ${currentLevel}`;
            
            // 動態難度設定：Level 1 從 2 個物件開始，每升一級多 1 個
            const targetCount = currentLevel + 1; 
            const distractorCount = targetCount + 2; // 干擾項永遠比目標多 2 個，製造壓力
            
            // 隨機抽取目標與干擾項
            const shuffledAssets = [...ASSETS].sort(() => 0.5 - Math.random());
            currentTargets = shuffledAssets.slice(0, targetCount);
            const distractors = shuffledAssets.slice(targetCount, targetCount + distractorCount);
            const allOptions = [...currentTargets, ...distractors].sort(() => 0.5 - Math.random());

            // 1. 編碼期 (記住目標) - 固定給予 3 秒
            renderStage(`<h2>請記住這 ${targetCount} 個物品</h2>`, currentTargets, false);
            
            setTimeout(() => {
                // 若時間已到，不再渲染選項
                if (performance.now() - startTime >= 60000) return; 
                
                // 2. 檢索期 (找出目標)
                renderStage(`<h2>請選出剛才出現的 ${targetCount} 個物品</h2>`, allOptions, true);
                optionsRenderTime = performance.now();
                isRetrieving = true;
            }, 3000);
        }

        function renderStage(titleHtml, items, isClickable) {
            const stage = document.getElementById('game-stage');
            let html = titleHtml + `<div class="items-container">`;
            
            items.forEach(item => {
                const clickAttr = isClickable ? `onclick="handleTap(this, '${item}')"` : '';
                html += `<div class="item-card" ${clickAttr}>${item}</div>`;
            });
            
            html += `</div>`;
            stage.innerHTML = html;
        }

        window.handleTap = (el, val) => {
            if (!isRetrieving || el.classList.contains('selected') || el.classList.contains('error')) return;

            const now = performance.now();
            const isCorrect = currentTargets.includes(val);

            if (isCorrect) {
                el.classList.add('selected');
                selectedItems.push(val);
                
                // 紀錄反應速度：從選項出現到點擊正確目標的時間差
                metrics.rtArray.push(now - optionsRenderTime);

                // 檢查是否已找齊所有目標
                if (selectedItems.length === currentTargets.length) {
                    isRetrieving = false; // 鎖定點擊
                    // 紀錄最大容量
                    if (currentTargets.length > metrics.maxCapacity) {
                        metrics.maxCapacity = currentTargets.length;
