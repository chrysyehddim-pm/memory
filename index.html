<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生活好時光(記憶力) PoC版</title>
    <style>
        :root {
            --bg-color: #FDFBF7;
            --text-color: #333333;
            --primary-btn: #2A9D8F;
            --card-bg: #FFFFFF;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --highlight-red: #D32F2F;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; box-sizing: border-box;
        }

        .status-bar {
            position: fixed; top: 20px; width: 90%; max-width: 800px;
            display: flex; justify-content: space-between; z-index: 10;
        }

        .tag {
            padding: 8px 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold;
            background: white; box-shadow: var(--shadow); border: 2px solid #EEE;
        }

        .stage { width: 100%; max-width: 800px; text-align: center; margin-top: 60px; }

        h2 { font-size: 1.8rem; margin-bottom: 20px; color: var(--text-color); }

        /* 表單樣式 */
        .input-group {
            display: flex; flex-direction: column; gap: 15px; margin: 30px auto; max-width: 300px;
        }
        .input-group input {
            padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; 
            border-radius: 10px; text-align: center; outline: none;
        }
        .input-group input:focus { border-color: var(--primary-btn); }

        .items-container { 
            display: flex; gap: 15px; justify-content: center; 
            flex-wrap: wrap; margin: 20px 0; min-height: 250px;
        }

        .item-card {
            background: var(--card-bg); border: 4px solid #eee; border-radius: 20px;
            padding: 20px; box-shadow: var(--shadow); font-size: 4rem;
            transition: transform 0.1s, border-color 0.2s; cursor: pointer; user-select: none;
            width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
        }

        .item-card.selected { border-color: var(--primary-btn); background-color: #E0F2F1; transform: scale(1.05); }
        .item-card.error { border-color: var(--highlight-red); background-color: #FFEBEE; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-large {
            background-color: var(--primary-btn); color: white; border: none;
            padding: 18px 50px; font-size: 1.5rem; border-radius: 50px;
            cursor: pointer; box-shadow: 0 6px 20px rgba(42, 157, 143, 0.3); margin-top: 20px;
        }

        .metrics-log {
            background: #fff; padding: 25px; border-radius: 15px;
            font-size: 1.1rem; text-align: left; margin-top: 20px; 
            box-shadow: var(--shadow); border: 1px solid #eee; line-height: 1.6;
        }

        .metrics-log strong { color: #111; font-size: 1.2rem; display: block; margin-top: 15px;}
        .metrics-log span.desc { display: block; font-size: 0.95rem; color: #666; margin-top: 5px; }

        #timer-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 8px; background: #eee; display: none;}
        #timer-bar { height: 100%; background: var(--highlight-red); width: 100%; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="timer-bar-container"><div id="timer-bar"></div></div>

    <div class="status-bar" id="status-bar" style="display: none;">
        <div id="level-tag" class="tag" style="color: var(--primary-btn);">難度: 1</div>
        <div id="time-tag" class="tag" style="color: var(--highlight-red);">60s</div>
    </div>

    <div class="stage" id="game-stage">
        <h1>🌞 生活好時光(記憶力) PoC版</h1>
        <h2>請先建立您的基準資料</h2>
        <div class="input-group">
            <input type="text" id="user-name" placeholder="輸入姓名或暱稱" required>
            <input type="number" id="user-age" placeholder="輸入實際年齡" min="10" max="120" required>
        </div>
        <button class="btn-large" onclick="validateAndStart()">開始驗證</button>
    </div>

    <script>
        const ASSETS = ["🍎", "🥦", "🍞", "🥩", "🐟", "🥕", "🍇", "🥚", "🥛", "🍪", "🔑", "📱", "🌂", "👓", "☕", "🧢", "📺", "🧦", "📚", "💊", "🐶", "🐱", "🐦", "🌷", "🌲", "🦋", "🌞", "🚲", "🎈", "🐝"];
        
        let metrics = {
            userName: "", userAge: 0, startLevel: 1, rtArray: [], maxCapacity: 0, commissionErrors: 0
        };

        let currentLevel = 1;
        let currentTargets = [];
        let selectedItems = [];
        let globalTimer = null;
        let startTime = 0;
        let optionsRenderTime = 0;
        let isRetrieving = false;

        // 步驟 1：驗證輸入與初始化難度
        function validateAndStart() {
            const nameInput = document.getElementById('user-name').value.trim();
            const ageInput = parseInt(document.getElementById('user-age').value);

            if (!nameInput || isNaN(ageInput) || ageInput <= 0) {
                alert("請輸入有效的暱稱與年齡，以確保特徵數據準確度。");
                return;
            }

            // 分齡邏輯設定起始難度
            if (ageInput <= 40) currentLevel = 3;      // 預設記 4 個
            else if (ageInput <= 60) currentLevel = 2; // 預設記 3 個
            else currentLevel = 1;                     // 預設記 2 個

            metrics = {
                userName: nameInput,
                userAge: ageInput,
                startLevel: currentLevel,
                rtArray: [], maxCapacity: 0, commissionErrors: 0
            };

            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('timer-bar-container').style.display = 'block';
            
            startTime = performance.now();
            startGlobalTimer();
            playRound();
        }

        function startGlobalTimer() {
            const timeTag = document.getElementById('time-tag');
            const timerBar = document.getElementById('timer-bar');
            
            globalTimer = setInterval(() => {
                const elapsed = performance.now() - startTime;
                const remaining = 60000 - elapsed;
                
                if (remaining <= 0) {
                    clearInterval(globalTimer);
                    endGame();
                } else {
                    timeTag.innerText = Math.ceil(remaining / 1000) + 's';
                    timerBar.style.width = (remaining / 60000 * 100) + '%';
                }
            }, 100);
        }

        function playRound() {
            isRetrieving = false;
            selectedItems = [];
            document.getElementById('level-tag').innerText = `難度: ${currentLevel}`;
            
            const targetCount = currentLevel + 1; 
            const distractorCount = targetCount + 2; 
            
            const shuffledAssets = [...ASSETS].sort(() => 0.5 - Math.random());
            currentTargets = shuffledAssets.slice(0, targetCount);
            const distractors = shuffledAssets.slice(targetCount, targetCount + distractorCount);
            const allOptions = [...currentTargets, ...distractors].sort(() => 0.5 - Math.random());

            renderStage(`<h2>請記住這 ${targetCount} 個物品</h2>`, currentTargets, false);
            
            setTimeout(() => {
                if (performance.now() - startTime >= 60000) return; 
                renderStage(`<h2>請選出剛才出現的 ${targetCount} 個物品</h2>`, allOptions, true);
                optionsRenderTime = performance.now();
                isRetrieving = true;
            }, 3000);
        }

        function renderStage(titleHtml, items, isClickable) {
            const stage = document.getElementById('game-stage');
            let html = titleHtml + `<div class="items-container">`;
            items.forEach(item => {
                const clickAttr = isClickable ? `onclick="handleTap(this, '${item}')"` : '';
                html += `<div class="item-card" ${clickAttr}>${item}</div>`;
            });
            html += `</div>`;
            stage.innerHTML = html;
        }

        window.handleTap = (el, val) => {
            if (!isRetrieving || el.classList.contains('selected') || el.classList.contains('error')) return;

            const now = performance.now();
            const isCorrect = currentTargets.includes(val);

            if (isCorrect) {
                el.classList.add('selected');
                selectedItems.push(val);
                metrics.rtArray.push(now - optionsRenderTime);

                if (selectedItems.length === currentTargets.length) {
                    isRetrieving = false; 
                    if (currentTargets.length > metrics.maxCapacity) metrics.maxCapacity = currentTargets.length;
                    currentLevel++; 
                    setTimeout(playRound, 500); 
                }
            } else {
                el.classList.add('error');
                metrics.commissionErrors++;
                isRetrieving = false; 
                currentLevel = Math.max(1, currentLevel - 1);
                setTimeout(playRound, 800); 
            }
        };

        function endGame() {
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('timer-bar-container').style.display = 'none';
            
            const avgRT = metrics.rtArray.length > 0 
                ? Math.round(metrics.rtArray.reduce((a, b) => a + b, 0) / metrics.rtArray.length) 
                : 0;

            // 生成帶有使用者名稱與年齡標記的 Mock ID，便於醫療展示識別
            const mockID = `Z-${metrics.userName.substring(0,2).toUpperCase()}-${metrics.userAge}-` + Date.now().toString().slice(-4);
            const perfText = metrics.commissionErrors === 0 ? "表現完美！" : "";

            const stage = document.getElementById('game-stage');
            stage.innerHTML = `
                <h2>分析完成</h2>
                <div class="metrics-log">
                    <p style="color:#2A9D8F; font-weight:bold;">[採樣成功] ID: ${mockID}</p>
                    <p style="font-size: 0.9rem; color: #888;">基準線設定: 起始難度 Lv.${metrics.startLevel} (依據年齡 ${metrics.userAge} 歲動態配發)</p>
                    
                    <strong>1. 記憶檢索速度: ${avgRT} 毫秒</strong>
                    <span class="desc">(從畫面出現到您成功點擊正確物件的平均耗時。未來將與同齡常模對比追蹤認知流暢度)</span>
                    
                    <strong>2. 最大記憶容量: ${metrics.maxCapacity} 個物件</strong>
                    <span class="desc">(您在本次 60 秒極限挑戰中，大腦能同時暫存並準確無誤找出的最高物件數量)</span>
                    
                    <strong>3. 假性記憶干擾: ${metrics.commissionErrors} 次</strong>
                    <span class="desc">(錯把「沒出現過的雜訊卡片」當成目標點擊的次數。${perfText}此數值越低代表記憶越清晰)</span>
                </div>
                <button class="btn-large" onclick="location.reload()">返回首頁重測</button>
            `;
        }
    </script>
</body>
</html>
